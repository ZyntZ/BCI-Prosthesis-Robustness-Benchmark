name: CI

on:
  push:
  pull_request:

jobs:
  test-and-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install package
        run: python -m pip install -e ".[dev]"
      - name: Compile check
        run: python -m compileall -q scripts src
      - name: Unit tests
        run: python -m pytest
      - name: Validate included reference results
        run: make validate-results
      - name: Build publication readiness manifest
        run: make release-manifest
